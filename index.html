<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codex 测试网页</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: #f4f7fb;
      color: #1d2733;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(100%, 520px);
      padding: 32px;
      border: 1px solid #d7e0ea;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 16px 40px rgba(31, 45, 61, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 24px;
      color: #526173;
      line-height: 1.7;
    }

    button {
      min-width: 160px;
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      background: #2364d2;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 160ms ease, transform 160ms ease;
    }

    button:hover {
      background: #1c55b3;
    }

    button:active {
      transform: translateY(1px);
    }

    #message {
      min-height: 28px;
      margin-top: 24px;
      font-weight: 700;
      color: #0f7a45;
    }
  </style>
</head>
<body>
  <main>
    <h1>我的第一个测试网页</h1>
    <p>这是一次 GitHub 到宝塔的同步测试，点击按钮看看效果。</p>
    <button id="showMessageButton" type="button">显示文字</button>
    <div id="message" aria-live="polite"></div>
  </main>

  <script>
    const button = document.querySelector("#showMessageButton");
    const message = document.querySelector("#message");

    button.addEventListener("click", () => {
      message.textContent = "同步测试成功！这段文字来自 Codex 的最新修改。";
    });
  </script>
</body>
</html>
