<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据库留言板测试</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: #f4f7fb;
      color: #1d2733;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 32px 20px;
    }

    main {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 32px;
      border: 1px solid #d7e0ea;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 16px 40px rgba(31, 45, 61, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.2;
      text-align: center;
    }

    .intro {
      margin: 0 0 28px;
      color: #526173;
      line-height: 1.7;
      text-align: center;
    }

    form {
      display: grid;
      gap: 14px;
      margin-bottom: 24px;
    }

    label {
      display: grid;
      gap: 6px;
      color: #37485c;
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid #cbd6e2;
      border-radius: 6px;
      padding: 12px;
      color: #1d2733;
      font: inherit;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    button {
      min-width: 160px;
      min-height: 44px;
      justify-self: start;
      border: 0;
      border-radius: 6px;
      background: #2364d2;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 160ms ease, transform 160ms ease;
    }

    button:hover {
      background: #1c55b3;
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    #status {
      min-height: 28px;
      margin: 0 0 18px;
      color: #0f7a45;
      font-weight: 700;
    }

    #status.error {
      color: #b3261e;
    }

    .messages-title {
      margin: 26px 0 12px;
      padding-top: 22px;
      border-top: 1px solid #e4ebf2;
      font-size: 22px;
    }

    .messages {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .message-item {
      padding: 14px;
      border: 1px solid #dbe4ee;
      border-radius: 8px;
      background: #f9fbfe;
    }

    .message-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: space-between;
      margin-bottom: 8px;
      color: #526173;
      font-size: 14px;
    }

    .message-name {
      color: #1d2733;
      font-weight: 700;
    }

    .message-content {
      margin: 0;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    @media (max-width: 560px) {
      main {
        padding: 24px;
      }

      h1 {
        font-size: 26px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>数据库留言板测试</h1>
    <p class="intro">这次测试 PHP 接口连接 MySQL：提交留言后，内容会保存到数据库里。</p>

    <form id="messageForm">
      <label>
        昵称
        <input id="nameInput" name="name" type="text" maxlength="50" placeholder="请输入你的昵称" required>
      </label>

      <label>
        留言内容
        <textarea id="contentInput" name="content" maxlength="500" placeholder="写一条测试留言" required></textarea>
      </label>

      <button id="submitButton" type="submit">提交留言</button>
    </form>

    <p id="status" aria-live="polite"></p>

    <h2 class="messages-title">最新留言</h2>
    <ul id="messagesList" class="messages"></ul>
  </main>

  <script>
    const form = document.querySelector("#messageForm");
    const nameInput = document.querySelector("#nameInput");
    const contentInput = document.querySelector("#contentInput");
    const submitButton = document.querySelector("#submitButton");
    const statusText = document.querySelector("#status");
    const messagesList = document.querySelector("#messagesList");

    function setStatus(text, isError = false) {
      statusText.textContent = text;
      statusText.classList.toggle("error", isError);
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function loadMessages() {
      const response = await fetch("api/messages.php");
      const result = await response.json();

      if (!result.success) {
        throw new Error(result.message || "读取留言失败。");
      }

      if (result.data.length === 0) {
        messagesList.innerHTML = '<li class="message-item">还没有留言，先提交第一条吧。</li>';
        return;
      }

      messagesList.innerHTML = result.data.map((item) => `
        <li class="message-item">
          <div class="message-meta">
            <span class="message-name">${escapeHtml(item.name)}</span>
            <span>${escapeHtml(item.created_at)}</span>
          </div>
          <p class="message-content">${escapeHtml(item.content)}</p>
        </li>
      `).join("");
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      submitButton.disabled = true;
      setStatus("正在提交留言...");

      try {
        const response = await fetch("api/messages.php", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            name: nameInput.value,
            content: contentInput.value,
          }),
        });
        const result = await response.json();

        if (!result.success) {
          throw new Error(result.message || "提交失败。");
        }

        contentInput.value = "";
        setStatus("留言保存成功，已经写入 MySQL 数据库。");
        await loadMessages();
      } catch (error) {
        setStatus(error.message, true);
      } finally {
        submitButton.disabled = false;
      }
    });

    loadMessages().catch((error) => {
      setStatus(error.message, true);
      messagesList.innerHTML = '<li class="message-item">数据库接口还没有配置好，完成 api/config.php 后刷新页面。</li>';
    });
  </script>
</body>
</html>
