<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>留言后台管理</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: #f4f7fb;
      color: #1d2733;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 32px 20px;
    }

    main {
      width: min(100%, 860px);
      margin: 0 auto;
      padding: 32px;
      border: 1px solid #d7e0ea;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 16px 40px rgba(31, 45, 61, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.2;
      text-align: center;
    }

    .intro {
      margin: 0 0 24px;
      color: #526173;
      line-height: 1.7;
      text-align: center;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      margin-bottom: 18px;
    }

    input {
      width: 100%;
      min-height: 44px;
      border: 1px solid #cbd6e2;
      border-radius: 6px;
      padding: 0 12px;
      color: #1d2733;
      font: inherit;
    }

    button {
      min-width: 112px;
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      background: #2364d2;
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 160ms ease, transform 160ms ease;
    }

    button:hover {
      background: #1c55b3;
    }

    button:active {
      transform: translateY(1px);
    }

    .delete-button {
      background: #b3261e;
    }

    .delete-button:hover {
      background: #8f1f18;
    }

    #status {
      min-height: 28px;
      margin: 0 0 14px;
      color: #0f7a45;
      font-weight: 700;
    }

    #status.error {
      color: #b3261e;
    }

    .messages {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .message-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
      padding: 14px;
      border: 1px solid #dbe4ee;
      border-radius: 8px;
      background: #f9fbfe;
    }

    .message-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: space-between;
      margin-bottom: 8px;
      color: #526173;
      font-size: 14px;
    }

    .message-name {
      color: #1d2733;
      font-weight: 700;
    }

    .message-content {
      margin: 0;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    @media (max-width: 640px) {
      main {
        padding: 24px;
      }

      .toolbar,
      .message-item {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>留言后台管理</h1>
    <p class="intro">输入管理密码后，可以删除不需要的留言。</p>

    <div class="toolbar">
      <input id="adminPasswordInput" type="password" placeholder="请输入管理密码">
      <button id="refreshButton" type="button">刷新留言</button>
    </div>

    <p id="status" aria-live="polite"></p>
    <ul id="messagesList" class="messages"></ul>
  </main>

  <script>
    const adminPasswordInput = document.querySelector("#adminPasswordInput");
    const refreshButton = document.querySelector("#refreshButton");
    const statusText = document.querySelector("#status");
    const messagesList = document.querySelector("#messagesList");

    function setStatus(text, isError = false) {
      statusText.textContent = text;
      statusText.classList.toggle("error", isError);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function loadMessages() {
      const response = await fetch("api/messages.php");
      const result = await response.json();

      if (!result.success) {
        throw new Error(result.message || "读取留言失败。");
      }

      if (result.data.length === 0) {
        messagesList.innerHTML = '<li class="message-item">暂无留言。</li>';
        return;
      }

      messagesList.innerHTML = result.data.map((item) => `
        <li class="message-item">
          <div>
            <div class="message-meta">
              <span class="message-name">#${escapeHtml(item.id)} ${escapeHtml(item.name)}</span>
              <span>${escapeHtml(item.created_at)}</span>
            </div>
            <p class="message-content">${escapeHtml(item.content)}</p>
          </div>
          <button class="delete-button" type="button" data-id="${escapeHtml(item.id)}">删除</button>
        </li>
      `).join("");
    }

    async function deleteMessage(id) {
      const adminPassword = adminPasswordInput.value.trim();

      if (adminPassword === "") {
        setStatus("请先输入管理密码。", true);
        return;
      }

      if (!confirm("确定要删除这条留言吗？")) {
        return;
      }

      const response = await fetch("api/messages.php", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          action: "delete",
          id,
          admin_password: adminPassword,
        }),
      });
      const result = await response.json();

      if (!result.success) {
        throw new Error(result.message || "删除失败。");
      }

      setStatus("留言已删除。");
      await loadMessages();
    }

    refreshButton.addEventListener("click", () => {
      loadMessages()
        .then(() => setStatus("留言列表已刷新。"))
        .catch((error) => setStatus(error.message, true));
    });

    messagesList.addEventListener("click", (event) => {
      const button = event.target.closest(".delete-button");
      if (!button) {
        return;
      }

      deleteMessage(button.dataset.id).catch((error) => {
        setStatus(error.message, true);
      });
    });

    loadMessages().catch((error) => {
      setStatus(error.message, true);
    });
  </script>
</body>
</html>
